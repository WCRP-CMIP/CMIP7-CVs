name: Prepare release (merge to main)

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Skip if this is a manifest-only commit (from a previous run)
      - name: Check if manifest-only commit
        id: skip_check
        run: |
          CHANGED=$(git diff --name-only HEAD~1..HEAD)
          if [ "$CHANGED" = "esgvoc_manifest.yaml" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Manifest-only commit detected — skipping release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/setup-esgvoc
        if: steps.skip_check.outputs.skip != 'true'
        with:
          extra-packages: pyyaml

      - name: Test cmip7 build
        if: steps.skip_check.outputs.skip != 'true'
        env:
          BRANCH: ${{ github.ref_name }}
        run: esgvoc test run cmip7 --branch "$BRANCH" --universe-branch main

      - name: Get manifest base SHA
        if: steps.skip_check.outputs.skip != 'true'
        id: base
        run: |
          PREV_SHA=$(git log -1 --format=%H -- esgvoc_manifest.yaml)
          echo "sha=${PREV_SHA}" >> "$GITHUB_OUTPUT"
          echo "Base SHA: ${PREV_SHA}"

      - name: Detect changes
        if: steps.skip_check.outputs.skip != 'true'
        id: changes
        uses: ./.github/actions/detect-changes
        with:
          base_sha: ${{ steps.base.outputs.sha }}
          github_token: ${{ github.token }}
          fetch_universe: "true"

      - name: Update manifest
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.bump_type != 'none'
        env:
          NEXT_VERSION: ${{ steps.changes.outputs.next_version }}
          UNIVERSE_VERSION: ${{ steps.changes.outputs.universe_version }}
          CHANGELOG: ${{ steps.changes.outputs.changelog }}
        run: |
          echo "${CHANGELOG}" | python3 .github/scripts/ci_update_manifest.py \
            --version "${NEXT_VERSION}" \
            --universe-version "${UNIVERSE_VERSION}" \
            --changelog-file -

          echo "Updated manifest:"
          cat esgvoc_manifest.yaml

      - name: Create manifest PR
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.bump_type != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_VERSION: ${{ steps.changes.outputs.next_version }}
          CURRENT_VERSION: ${{ steps.changes.outputs.current_version }}
          BUMP_TYPE: ${{ steps.changes.outputs.bump_type }}
          CHANGELOG: ${{ steps.changes.outputs.changelog }}
        run: |
          BRANCH="chore/manifest-${NEXT_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add esgvoc_manifest.yaml
          git diff --cached --quiet && echo "No manifest changes" && exit 0

          git commit -m "chore: update manifest to ${NEXT_VERSION}"
          git push origin "${BRANCH}"

          BODY=$(cat <<EOF
          ## Manifest update

          **Version:** ${CURRENT_VERSION} → ${NEXT_VERSION} (${BUMP_TYPE})

          ### Changelog
          ${CHANGELOG}

          ---

          Once merged, publish the release:

          \`\`\`bash
          gh workflow run publish.yml \\
            -R WCRP-CMIP/esgvoc_registry \\
            -f project_id=cmip7 \\
            -f bump_type=${BUMP_TYPE} \\
            -f project_repo=WCRP-CMIP/CMIP7_CVs
          \`\`\`
          EOF
          )

          gh pr create \
            --title "chore: update manifest to ${NEXT_VERSION}" \
            --body "${BODY}" \
            --base main \
            --head "${BRANCH}"

          gh pr merge "${BRANCH}" --auto --squash

      - name: No CV changes
        if: steps.skip_check.outputs.skip != 'true' && steps.changes.outputs.bump_type == 'none'
        run: echo "No CV files changed — no release needed."
