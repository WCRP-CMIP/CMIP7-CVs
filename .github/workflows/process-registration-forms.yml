name: Process registration forms

on:
  issues:
    types:
      - opened
      - edited

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-registration-form:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install form processor
        run: python -m pip install .github/form-processor

      - name: Process issue form
        env:
          # If we want more control, revert to this.
          # Try the below for now.
          # GITHUB_TOKEN: "${{ secrets.FORM_ACCESS_TOKEN }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          # Token authorising pull requests into the WCRP universe repository.
          # UNIVERSE_ACCESS_TOKEN: "${{ secrets.UNIVERSE_ACCESS_TOKEN }}"
          # TODO: switch back to the above once I can push to WCRP-CMIP universe
          # using my fork for testing
          UNIVERSE_ACCESS_TOKEN: "${{ secrets.UNIVERSE_ZNICHOLLSCR_ACCESS_TOKEN }}"
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # For testing, open the universe pull request in a fork (write access to
          # WCRP-CMIP/WCRP-universe is not yet available). Swap the commented lines
          # back once that access exists.
          UNIVERSE_REPOSITORY="https://github.com/znichollscr/WCRP-universe"
          # UNIVERSE_REPOSITORY="https://github.com/WCRP-CMIP/WCRP-universe"
          python -m github_form_processor \
            --event-path "${{ github.event_path }}" \
            --cmip7-repository "${{ github.server_url }}/${{ github.repository }}" \
            --pr-base-branch esgvoc_dev \
            --universe-repository "${UNIVERSE_REPOSITORY}" \
            --universe-base-branch esgvoc_dev \
            --experiment-output-dir experiment \
            --activity-output-dir activity \
            --institution-output-dir institution \
            --universe-organisation-dir organisation \
            --universe-institution-dir institution \
            --cmip7-cvs-path "${{ github.workspace }}"
